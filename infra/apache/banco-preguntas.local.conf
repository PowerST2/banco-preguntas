<VirtualHost *:80>
    ServerName banco-preguntas.local
    DocumentRoot /home/vboxuser/Desktop/banco-preguntas/public

    <Directory /home/vboxuser/Desktop/banco-preguntas/public>
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/banco-preguntas_error.log
    CustomLog ${APACHE_LOG_DIR}/banco-preguntas_access.log combined
</VirtualHost>
